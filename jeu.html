<!DOCTYPE html>
  border:none;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:800;
}

.closeBtn:hover{
  background:#8B5BB8;
}
</style>
</head>
<body>

<div id="map">

  <div id="topbar">
    <div class="logo">LA ROUTE <span>DU ROME</span></div>
    <div>Personnage : <span id="heroName"></span></div>
  </div>

  <!-- MARQUEURS -->

  <div class="marker" style="top:25%; left:20%;" onclick="openDialogue('BTP', 'Découvre les métiers du bâtiment et les entreprises qui recrutent en Ille-et-Vilaine.')">
    <div class="icon">🏗️</div>
    <div class="label">BTP</div>
  </div>

  <div class="marker" style="top:50%; left:45%;" onclick="openDialogue('Restauration', 'Les métiers de la restauration recherchent de nombreux profils motivés.')">
    <div class="icon">🍽️</div>
    <div class="label">Restauration</div>
  </div>

  <div class="marker" style="top:35%; left:70%;" onclick="openDialogue('Numérique', 'Le numérique recrute des développeurs, designers et techniciens.')">
    <div class="icon">💻</div>
    <div class="label">Numérique</div>
  </div>

  <div class="marker" style="top:70%; left:60%;" onclick="openDialogue('Transport', 'Le secteur du transport et de la logistique recrute fortement.')">
    <div class="icon">🚚</div>
    <div class="label">Transport</div>
  </div>

  <div id="dialogue">
    <h2 id="dialogueTitle"></h2>
    <p id="dialogueText"></p>
    <button class="closeBtn" onclick="closeDialogue()">FERMER</button>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const hero = params.get('hero') || 'elio';

if(hero === 'elio'){
  document.getElementById('heroName').textContent = 'ELIO';
}else{
  document.getElementById('heroName').textContent = 'ELIA';
}

function openDialogue(title, text){
  document.getElementById('dialogue').style.display = 'block';
  document.getElementById('dialogueTitle').textContent = title;
  document.getElementById('dialogueText').textContent = text;
}

function closeDialogue(){
  document.getElementById('dialogue').style.display = 'none';
}
</script>

</body>
</html>
