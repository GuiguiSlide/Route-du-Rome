<!DOCTYPE html>
<body>

<div class="container">
  <div class="badge">France Travail · Ille-et-Vilaine</div>

  <h1>
    LA ROUTE<br>
    <span>DU ROME</span>
  </h1>

  <div class="subtitle">CHOISIS TON PERSONNAGE</div>

  <div class="cards">

    <div class="card" onclick="startGame('elio')">
      <img src="https://images.unsplash.com/photo-1511367461989-f85a21fda167?q=80&w=1200&auto=format&fit=crop" alt="Elio">
      <div class="card-content">
        <h2>ELIO</h2>
        <p>Explorateur des métiers du 35</p>
      </div>
    </div>

    <div class="card" onclick="startGame('elia')">
      <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop" alt="Elia">
      <div class="card-content">
        <h2>ELIA</h2>
        <p>Aventurière de Saint-Malo</p>
      </div>
    </div>

  </div>
</div>

<div id="videoOverlay">
  <button id="skipBtn" onclick="goToGame()">PASSER</button>
  <video id="introVideo" autoplay muted playsinline></video>
</div>

<script>
let selectedHero = "elio";

function startGame(hero){
  selectedHero = hero;

  const overlay = document.getElementById('videoOverlay');
  const video = document.getElementById('introVideo');

  overlay.style.display = 'flex';

  // IMPORTANT : vidéos à la racine GitHub
  if(hero === 'elio'){
    video.src = './Elio1.mp4';
  } else {
    video.src = './Elia1.mp4';
  }

  video.load();

  const playPromise = video.play();

  if(playPromise !== undefined){
    playPromise.catch(error => {
      console.log('Lecture auto bloquée :', error);
    });
  }

  video.onended = () => {
    goToGame();
  };
}

function goToGame(){
  window.location.href = `jeu.html?hero=${selectedHero}`;
}
</script>

</body>
</html>
